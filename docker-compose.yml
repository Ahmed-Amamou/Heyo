services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: heyo-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./.qdrant_data:/qdrant/storage
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: heyo-ollama
    ports:
      - "11434:11434"
    volumes:
      - ./.ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    profiles: ["ollama-docker"]  # default setup uses native Ollama; enable this to run it in Docker

  api:
    build: .
    container_name: heyo-api
    ports:
      - "8000:8000"
    environment:
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_BASE_URL=http://host.docker.internal:11434/v1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./skills:/app/skills
      - ./workspace:/app/workspace
      - ./models.yaml:/app/models.yaml:ro
      - ./mcp.json:/app/mcp.json:ro
    depends_on:
      - qdrant
    profiles: ["full"]  # for dev, run the API natively with: uv run heyo-api

  # Optional vLLM backend for hardware with more VRAM (>=16GB recommended).
  # Enable with: docker compose --profile vllm up -d vllm
  vllm:
    image: vllm/vllm-openai:latest
    container_name: heyo-vllm
    ports:
      - "8001:8000"
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
    command: >
      --model ${VLLM_MODEL:-Qwen/Qwen2.5-7B-Instruct-AWQ}
      --max-model-len ${VLLM_MAX_LEN:-8192}
      --gpu-memory-utilization ${VLLM_GPU_UTIL:-0.90}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    profiles: ["vllm"]
