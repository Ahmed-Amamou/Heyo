<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>heyo</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ccircle cx='8' cy='8' r='5.5' fill='none' stroke='%23e8e5df' stroke-width='2'/%3E%3C/svg%3E">
<style>
/* ───────────────────────── heyo — minimal console ─────────────────────────
   one name up top; the "o" is the status orb (tinted by whichever agent is
   working). each reply carries its own inline run-chain: route → thinking →
   tools → answer, streamed live, folding into a one-line summary when done. */
:root{
  --bg:#0a0a0b; --txt:#e8e5df; --dim:#8e8a82; --faint:#54514b;
  --hair:#1e1e21; --bub:#151517; --codebg:#121214;
  --c-chat:#d8d4cc; --c-files:#e0b35c; --c-web:#5fb8ca; --c-apps:#b18ae0;
  --c-mcp:#7fc787; --c-router:#8e8a82; --c-err:#e26b5f;
  --sans:ui-sans-serif,system-ui,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --mono:ui-monospace,"Cascadia Code","JetBrains Mono",Consolas,Menlo,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--txt);font-family:var(--sans);font-size:15px}

/* ── header: just the name ── */
header{
  position:fixed;inset:0 0 auto 0;height:72px;z-index:5;pointer-events:none;
  display:grid;place-items:center;
  background:linear-gradient(var(--bg) 35%,color-mix(in srgb,var(--bg) 85%,transparent) 75%,transparent);
}
.brand{
  pointer-events:auto;font-size:22px;font-weight:600;letter-spacing:.18em;
  user-select:none;cursor:default;
}
.orb{
  display:inline-block;width:.55em;height:.55em;border-radius:50%;
  border:.085em solid currentColor;margin-left:.02em;--st:currentColor;
  transition:border-color .35s,background .35s,box-shadow .35s;
}
.orb.busy{
  border-color:var(--st);background:var(--st);
  box-shadow:0 0 16px var(--st);animation:breathe 1.5s ease-in-out infinite;
}
.orb.err{border-color:var(--c-err);background:var(--c-err);box-shadow:0 0 10px var(--c-err)}
@keyframes breathe{50%{transform:scale(.8);opacity:.65}}

/* ── thread ── */
main{height:100%;overflow-y:auto;scrollbar-width:thin;scrollbar-color:#222 transparent}
.thread{
  max-width:680px;margin:0 auto;padding:110px 22px 170px;
  display:flex;flex-direction:column;
}
.msg-user{
  align-self:flex-end;max-width:78%;margin:10px 0 2px;
  background:var(--bub);border:1px solid var(--hair);
  border-radius:16px 16px 4px 16px;padding:9px 14px;
  white-space:pre-wrap;color:#d9d5ce;animation:rise .25s ease;
}
.turn{width:100%;margin:14px 0 26px;animation:rise .25s ease}
.notice{
  align-self:center;margin:14px 0;color:var(--faint);
  font:12px var(--mono);text-align:center;animation:rise .25s ease;
}

/* ── the run chain ── */
.run{font:12px var(--mono);color:var(--dim);margin:2px 0 14px}
.run .steps{
  border-left:1px solid var(--hair);margin-left:5px;padding:2px 0 2px 16px;
  display:flex;flex-direction:column;gap:8px;
}
.step{position:relative;line-height:1.5;animation:rise .22s ease;max-width:100%}
.step::before{
  content:"";position:absolute;left:-19.5px;top:.42em;width:6px;height:6px;
  border-radius:50%;background:var(--sc,var(--faint));
}
.step .why{color:var(--faint)}
.step.route{color:var(--txt)}
.step.route .why{color:var(--dim)}
.step.err{color:var(--c-err)}
.step.tool{cursor:pointer}
.step.tool .args{color:var(--faint)}
.step.tool .res{
  display:block;color:var(--faint);overflow:hidden;text-overflow:ellipsis;
  white-space:nowrap;max-width:100%;
}
.step.tool.open .res{white-space:pre-wrap;word-break:break-word}
.step.think .tlabel{cursor:pointer;user-select:none;color:var(--dim)}
.step.think .tlabel:hover{color:var(--txt)}
.tstream{
  margin-top:5px;max-height:88px;overflow-y:auto;scrollbar-width:none;
  color:var(--faint);white-space:pre-wrap;line-height:1.55;word-break:break-word;
  mask-image:linear-gradient(transparent,#000 30%);
  -webkit-mask-image:linear-gradient(transparent,#000 30%);
}
.tstream::-webkit-scrollbar{display:none}
.step.think.closed .tstream{display:none}
.step.think.closed.open .tstream{display:block;max-height:none;mask-image:none;-webkit-mask-image:none}
.ellip{animation:fade 1.2s infinite}
@keyframes fade{50%{opacity:.25}}

.runsum{
  display:none;align-items:center;gap:8px;background:none;border:0;padding:0;
  font:inherit;color:var(--faint);cursor:pointer;letter-spacing:.02em;
}
.runsum::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--sc,var(--faint))}
.runsum:hover{color:var(--dim)}
.run.done:not(.open) .steps{display:none}
.run.done .runsum{display:inline-flex}
.run.done.open .runsum .chev{transform:rotate(180deg)}
.runsum .chev{display:inline-block;transition:transform .2s;color:var(--faint)}

/* ── answer (light markdown) ── */
.answer{line-height:1.72;word-break:break-word}
.answer:empty{display:none}
.answer p{margin:.55em 0}
.answer p:first-child{margin-top:0}
.answer strong{color:#fff;font-weight:600}
.answer .h{display:block;margin:.9em 0 .25em;color:#fff}
.answer a{color:var(--c-web);text-decoration:none;border-bottom:1px solid color-mix(in srgb,var(--c-web) 35%,transparent)}
.answer code{background:var(--codebg);border:1px solid var(--hair);border-radius:5px;padding:.08em .35em;font:.86em var(--mono)}
.answer pre{background:var(--codebg);border:1px solid var(--hair);border-radius:10px;padding:12px 14px;overflow-x:auto;margin:.7em 0}
.answer pre code{background:none;border:0;padding:0;font-size:12.5px;line-height:1.55}
.answer ul,.answer ol{margin:.55em 0;padding-left:1.35em}
.answer li{margin:.22em 0}
.answer .cursor::after{content:"▍";color:var(--dim);animation:fade .9s infinite}

/* ── empty state ── */
.empty{margin-top:27vh;text-align:center;color:var(--dim);animation:rise .4s ease}
.empty em{font-style:normal;color:var(--txt)}
.chips{margin-top:26px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.chips button{
  font:13px var(--sans);color:var(--dim);background:none;cursor:pointer;
  border:1px solid var(--hair);border-radius:999px;padding:7px 15px;transition:.2s;
}
.chips button:hover{color:var(--txt);border-color:#2f2f34}

/* ── composer ── */
footer{
  position:fixed;inset:auto 0 0 0;z-index:5;padding:26px 22px 18px;
  background:linear-gradient(transparent,var(--bg) 55%);
}
.dock{max-width:680px;margin:0 auto}
#composer{
  display:flex;align-items:center;gap:2px;
  background:var(--bub);border:1px solid var(--hair);border-radius:18px;
  padding:5px 6px 5px 18px;transition:border-color .2s;
}
#composer:focus-within{border-color:#2e2e33}
#input{flex:1;background:none;border:0;outline:0;color:var(--txt);font:15px var(--sans);padding:9px 0}
#input::placeholder{color:var(--faint)}
.iconbtn{
  width:36px;height:36px;border-radius:50%;border:0;background:none;flex:none;
  display:grid;place-items:center;color:var(--dim);cursor:pointer;transition:.2s;
}
.iconbtn:hover{color:var(--txt)}
.iconbtn svg{width:17px;height:17px}
#send{display:none;background:var(--txt);color:var(--bg)}
#composer.has-text #send{display:grid}
#mic.rec{background:var(--c-err);color:#fff;animation:breathe 1.5s infinite}
#mic.busy{opacity:.4;pointer-events:none}
.hints{
  display:flex;align-items:center;gap:9px;padding:9px 8px 0;
  font:11px var(--mono);color:var(--faint);
}
.hints button{font:inherit;color:inherit;background:none;border:0;cursor:pointer;padding:0}
.hints button:hover{color:var(--dim)}
.hints #speakToggle.on{color:var(--c-mcp)}
.hints .grow{flex:1}

@keyframes rise{from{opacity:0;transform:translateY(4px)}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
@media (max-width:560px){.hints .kbd{display:none}.msg-user{max-width:88%}}
</style>
</head>
<body>
<header><div class="brand" id="brand">hey<span class="orb" id="orb"></span></div></header>

<main id="main">
  <div class="thread" id="thread"></div>
</main>

<footer>
  <div class="dock">
    <form id="composer" autocomplete="off">
      <input id="input" placeholder="Message heyo" autofocus>
      <button type="button" class="iconbtn" id="mic" title="talk — ctrl+m">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0"/><path d="M12 18v3"/></svg>
      </button>
      <button type="submit" class="iconbtn" id="send" title="send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V6"/><path d="m6 11 6-6 6 6"/></svg>
      </button>
    </form>
    <div class="hints">
      <button type="button" id="speakToggle">replies aloud · off</button>
      <span>·</span>
      <button type="button" id="newChat">new chat</button>
      <span class="grow"></span>
      <span class="kbd">ctrl+m talk · esc hush</span>
    </div>
  </div>
</footer>

<script>
const $=s=>document.querySelector(s);
const main=$("#main"),thread=$("#thread"),input=$("#input"),composer=$("#composer"),
      micBtn=$("#mic"),orb=$("#orb"),brand=$("#brand"),speakToggle=$("#speakToggle");
const COLOR={chat:"--c-chat",files:"--c-files",web:"--c-web",apps:"--c-apps",
             mcp:"--c-mcp",router:"--c-router"};
let sessionId=null,busy=false,speakAll=localStorage.heyoSpeak==="1",audioEl=null;

const esc=s=>String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const el=(t,c,html)=>{const d=document.createElement(t);if(c)d.className=c;if(html!=null)d.innerHTML=html;return d;};
const glue=()=>{if(main.scrollHeight-main.scrollTop-main.clientHeight<200)main.scrollTop=main.scrollHeight;};

/* ── status orb: the "o" in heyo ── */
function setOrb(color,err=false){
  orb.classList.toggle("err",err);
  orb.classList.toggle("busy",!!color&&!err);
  orb.style.setProperty("--st",color?`var(${color})`:"currentColor");
  document.title=color&&!err?"● heyo":"heyo";
}

/* ── empty state ── */
const EMPTY=`<div class="empty" id="empty">
  Say <em>“Heyo”</em> near your mic — or type below.
  <div class="chips">
    <button data-q="open the calculator">open the calculator</button>
    <button data-q="what is the latest python version? check python.org">look something up</button>
    <button data-q="create notes.txt containing a haiku about terminals">write me a file</button>
  </div></div>`;
thread.innerHTML=EMPTY;
thread.addEventListener("click",e=>{
  const b=e.target.closest(".chips button");
  if(b)send(b.dataset.q);
});

function notice(text){
  const n=el("div","notice");n.textContent=text;
  thread.appendChild(n);glue();
  setTimeout(()=>n.remove(),8000);
}

/* ── mini markdown (answers only) ── */
function md(src){
  const codes=[];
  let t=esc(src.trim())
    .replace(/```\w*\n?([\s\S]*?)(?:```|$)/g,(_,c)=>(codes.push(c.replace(/\n$/,"")),"\x00"+(codes.length-1)+"\x00"))
    .replace(/`([^`\n]+)`/g,"<code>$1</code>")
    .replace(/^#{1,6}\s+(.+)$/gm,'<span class="h">$1</span>')
    .replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>")
    .replace(/(^|[\s(])\*([^*\n]+)\*(?=[\s).,;:!?]|$)/g,"$1<em>$2</em>")
    .replace(/\[([^\]]+)\]\((https?:[^)\s]+)\)/g,'<a href="$2" target="_blank" rel="noreferrer">$1</a>')
    .replace(/(?:^|\n)((?:\s*[-*]\s+.+(?:\n|$))+)/g,(_,L)=>"\n<ul>"+L.trim().split("\n").map(i=>"<li>"+i.replace(/^\s*[-*]\s+/,"")+"</li>").join("")+"</ul>\n")
    .replace(/(?:^|\n)((?:\s*\d+[.)]\s+.+(?:\n|$))+)/g,(_,L)=>"\n<ol>"+L.trim().split("\n").map(i=>"<li>"+i.replace(/^\s*\d+[.)]\s+/,"")+"</li>").join("")+"</ol>\n");
  t=t.split(/\n{2,}/).map(p=>{
    p=p.trim();if(!p)return"";
    return /^(<(ul|ol|span class="h")|\x00)/.test(p)?p:"<p>"+p.replace(/\n/g,"<br>")+"</p>";
  }).join("");
  return t.replace(/\x00(\d+)\x00/g,(_,i)=>`<pre><code>${codes[i]}</code></pre>`);
}

/* ── one assistant turn: run chain + answer ── */
function startTurn(){
  const turn=el("div","turn",
    `<div class="run"><div class="steps"></div>
     <button class="runsum" type="button"></button></div><div class="answer"></div>`);
  thread.appendChild(turn);
  const run=turn.querySelector(".run"),steps=turn.querySelector(".steps"),
        sum=turn.querySelector(".runsum"),answer=turn.querySelector(".answer");
  sum.addEventListener("click",()=>run.classList.toggle("open"));
  const T={t0:Date.now(),route:null,tools:0,thinkSecs:0,seg:null,lastTool:null,acc:"",gotToken:false};

  function addStep(cls,html,color){
    const d=el("div","step "+cls,html);
    if(color)d.style.setProperty("--sc",`var(${color})`);
    steps.appendChild(d);glue();return d;
  }
  function fmtArgs(a){
    try{const o=typeof a==="string"?JSON.parse(a):(a||{});
      return Object.entries(o).map(([k,v])=>`${k}: ${typeof v==="string"?v:JSON.stringify(v)}`).join(", ");
    }catch{return String(a??"")}
  }
  function closeThink(){
    if(!T.seg)return;
    const dt=(Date.now()-T.seg.t0)/1e3;T.thinkSecs+=dt;
    T.seg.label.innerHTML=`thought ${dt<9.5?dt.toFixed(1):Math.round(dt)}s <span class="chev">⌄</span>`;
    T.seg.el.classList.add("closed");T.seg=null;
  }
  return {
    thinking(text){
      if(!T.seg){
        const d=addStep("think",`<div class="tlabel">thinking<span class="ellip"> …</span></div><div class="tstream"></div>`);
        const label=d.querySelector(".tlabel");
        label.addEventListener("click",()=>d.classList.toggle("open"));
        T.seg={el:d,label,stream:d.querySelector(".tstream"),t0:Date.now()};
      }
      T.seg.stream.textContent+=text;
      T.seg.stream.scrollTop=T.seg.stream.scrollHeight;glue();
    },
    trace(ev){
      const{node,status}=ev;
      if(node==="prepare"&&status==="done"&&!ev.error){
        const bits=[];
        if(ev.memories)bits.push(`${ev.memories} memor${ev.memories>1?"ies":"y"}`);
        if(ev.skills?.length)bits.push(`skill: ${ev.skills.join(", ")}`);
        if(bits.length)addStep("ctx",`recall · ${esc(bits.join(" · "))}`);
      }else if(node==="router"&&status==="start"){
        setOrb("--c-router");
      }else if(node==="router"&&status==="done"&&ev.route){
        T.route=ev.route;
        const c=COLOR[ev.route]||"--c-router";
        run.style.setProperty("--sc",`var(${c})`);
        addStep("route",`→ ${esc(ev.route)}${ev.rationale?` <span class="why">— ${esc(ev.rationale)}</span>`:""}`,c);
        setOrb(c);
      }else if(status==="tool"){
        closeThink();T.tools++;
        const me=addStep("tool",
          `⌬ ${esc(ev.tool)}<span class="args">(${esc(fmtArgs(ev.args))})</span><span class="res"></span>`,
          COLOR[T.route]||"--c-router");
        me.onclick=()=>me.classList.toggle("open");
        T.lastTool=me;
      }else if(status==="tool_result"&&T.lastTool){
        T.lastTool.querySelector(".res").textContent="→ "+(ev.result||"").trim();
      }else if(status==="done"&&ev.note){
        addStep("err",esc(ev.note));
      }
    },
    token(text){
      if(!T.gotToken){closeThink();T.gotToken=true;}
      T.acc+=text;
      answer.textContent=T.acc;answer.classList.add("cursor");glue();
    },
    done(response){
      closeThink();answer.classList.remove("cursor");
      answer.innerHTML=md(response||T.acc||"");
      const dt=((Date.now()-T.t0)/1e3).toFixed(1);
      const bits=[T.route||"chat"];
      if(T.thinkSecs>=1)bits.push(`thought ${Math.round(T.thinkSecs)}s`);
      if(T.tools)bits.push(`${T.tools} tool${T.tools>1?"s":""}`);
      bits.push(`${dt}s`);
      sum.innerHTML=`${bits.join(" · ")} <span class="chev">⌄</span>`;
      run.classList.add("done");glue();
    },
    error(detail){
      closeThink();addStep("err","✗ "+esc(detail));
      answer.classList.remove("cursor");
      if(!answer.innerHTML)answer.innerHTML=`<p style="color:var(--c-err)">${esc(detail)}</p>`;
      run.classList.add("done");
      sum.innerHTML=`failed · <span class="chev">⌄</span>`;
      run.classList.add("open");
    },
  };
}

/* ── send over SSE ── */
async function send(text,viaVoice=false){
  text=(text||"").trim();
  if(!text||busy)return;
  busy=true;
  $("#empty")?.remove();
  const u=el("div","msg-user");u.textContent=text;thread.appendChild(u);
  main.scrollTop=main.scrollHeight;
  const turn=startTurn();
  setOrb("--c-router");
  const wantSpeech=viaVoice||speakAll;
  try{
    const resp=await fetch("/chat",{method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:text,session_id:sessionId,voice:wantSpeech})});
    if(!resp.ok)throw new Error("HTTP "+resp.status);
    const reader=resp.body.getReader(),dec=new TextDecoder();
    let buf="",event=null;
    for(;;){
      const{done,value}=await reader.read();
      if(done)break;
      buf+=dec.decode(value,{stream:true});
      const lines=buf.split("\n");buf=lines.pop();
      for(const line of lines){
        if(line.startsWith("event:"))event=line.slice(6).trim();
        else if(line.startsWith("data:")){
          const data=JSON.parse(line.slice(5));
          if(event==="trace")turn.trace(data);
          else if(event==="thinking")turn.thinking(data.text);
          else if(event==="token")turn.token(data.text);
          else if(event==="error")turn.error(data.detail);
          else if(event==="done"){
            sessionId=data.session_id;
            turn.done(data.response);
            if(wantSpeech&&data.response)speak(data.response);
          }
        }
      }
    }
  }catch(err){turn.error(err.message);}
  busy=false;setOrb(null);input.focus();
}

composer.addEventListener("submit",e=>{
  e.preventDefault();
  const t=input.value;input.value="";
  composer.classList.remove("has-text");
  send(t);
});
input.addEventListener("input",()=>composer.classList.toggle("has-text",!!input.value.trim()));

/* ── browser voice: push-to-talk → /voice/transcribe ── */
let rec=null;
async function toggleMic(){
  if(rec){stopMic();return;}
  if(busy)return;
  let stream;
  try{stream=await navigator.mediaDevices.getUserMedia({audio:true});}
  catch{notice("microphone permission denied");return;}
  const ctx=new AudioContext(),an=ctx.createAnalyser();
  an.fftSize=2048;ctx.createMediaStreamSource(stream).connect(an);
  const mime=MediaRecorder.isTypeSupported("audio/webm;codecs=opus")?"audio/webm;codecs=opus":"";
  const r=new MediaRecorder(stream,mime?{mimeType:mime}:undefined);
  const chunks=[];
  r.ondataavailable=e=>chunks.push(e.data);
  r.onstop=async()=>{
    stream.getTracks().forEach(t=>t.stop());ctx.close();
    micBtn.classList.remove("rec");micBtn.classList.add("busy");
    input.placeholder="transcribing…";
    try{
      const blob=new Blob(chunks,{type:r.mimeType||"audio/webm"});
      const resp=await fetch("/voice/transcribe",{method:"POST",
        headers:{"Content-Type":blob.type},body:blob});
      if(!resp.ok)throw new Error((await resp.json()).detail||"HTTP "+resp.status);
      const{text}=await resp.json();
      if(text)send(text,true);
      else notice("didn't catch that — try again");
    }catch(e){notice("voice: "+e.message);}
    micBtn.classList.remove("busy");input.placeholder="Message heyo";
  };
  // auto-stop on trailing silence (or 15s cap)
  const buf=new Float32Array(an.fftSize);
  let spoke=false,quiet=0;const t0=Date.now();
  const poll=setInterval(()=>{
    an.getFloatTimeDomainData(buf);
    let s=0;for(let i=0;i<buf.length;i++)s+=buf[i]*buf[i];
    const rms=Math.sqrt(s/buf.length);
    if(rms>0.013){spoke=true;quiet=0;}
    else if(spoke&&(quiet+=100)>1500)stopMic();
    if(Date.now()-t0>15000)stopMic();
  },100);
  rec={r,poll};
  r.start();
  micBtn.classList.add("rec");
  input.placeholder="listening… click again to send";
}
function stopMic(){
  if(!rec)return;
  clearInterval(rec.poll);
  try{rec.r.stop()}catch{}
  rec=null;
}

/* ── spoken replies: /voice/speak ── */
async function speak(text){
  try{
    const resp=await fetch("/voice/speak",{method:"POST",
      headers:{"Content-Type":"application/json"},body:JSON.stringify({text})});
    if(!resp.ok)return;
    audioEl?.pause();
    audioEl=new Audio(URL.createObjectURL(await resp.blob()));
    audioEl.play();
  }catch{}
}

micBtn.addEventListener("click",toggleMic);
speakToggle.addEventListener("click",()=>{
  speakAll=!speakAll;
  localStorage.heyoSpeak=speakAll?"1":"0";
  speakToggle.textContent=`replies aloud · ${speakAll?"on":"off"}`;
  speakToggle.classList.toggle("on",speakAll);
});
if(speakAll){speakToggle.textContent="replies aloud · on";speakToggle.classList.add("on");}
$("#newChat").addEventListener("click",()=>{
  sessionId=null;thread.innerHTML=EMPTY;input.focus();
});
document.addEventListener("keydown",e=>{
  if(e.key==="Escape"){audioEl?.pause();stopMic();}
  if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==="m"){e.preventDefault();toggleMic();}
});

/* ── health → orb tooltip ── */
(async()=>{
  try{
    const h=await(await fetch("/health")).json();
    brand.title="models: "+[...new Set(Object.values(h.roles||{}))].join(" · ");
  }catch{
    setOrb(null,true);
    notice("server offline — start it with scripts/run.sh");
  }
})();
</script>
